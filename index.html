
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targetsqr.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        
        <a-asset-item id="avatarModel" src="Shaani_Deva.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
       <a-plane src="#card" position="0 0 0" height="1.2" width="2" rotation="0 0 0"></a-plane>
        <a-gltf-model rotation="-90 170 20" position="0 0 0.4" scale="0.5 0.5 0.5" src="#avatarModel">
      </a-entity>
    </a-scene>
  </body>
</html>
